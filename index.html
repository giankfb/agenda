<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <title>Agenda Fotografia</title>

  <link rel="stylesheet" href="css/style.css?v=2">
  <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />
  <link rel="manifest" href="manifest.json?v=2">
</head>
<body>

  <!-- =========================================
                  TOPO
  ========================================== -->

  <header class="topbar">

    <div>
      <h1>Agenda</h1>
      <p>Controle de eventos</p>
    </div>

    <button
      id="btnNovoEvento"
      onclick="abrirModal()"
    >
      +
    </button>

  </header>

  <!-- =========================================
                FILTROS
  ========================================== -->

  <section class="filtros">

    <input
      type="text"
      id="busca"
      placeholder="Buscar cliente..."
    >

    <select id="filtroStatus">

      <option value="Todos">
        Todos
      </option>

      <option value="Pendente">
        Pendentes
      </option>

      <option value="Pago">
        Pagos
      </option>

      <option value="Cancelado">
        Cancelados
      </option>

    </select>

  </section>

  <!-- =========================================
                DASHBOARD
  ========================================== -->

  <main>

    <div id="dashboard-cards"></div>

    <div id="listaEventos"></div>

    <div class="acoes-topo">

      <button id="toggleCalendario">
        Ver Calendário
      </button>

    </div>

    <div
      id="calendarContainer"
      class="hidden"
    >

      <div id="calendar"></div>

    </div>

  </main>

  <!-- =========================================
                  MODAL
  ========================================== -->

  <div
    id="modalEvento"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>Novo Evento</h2>

      <input type="date" id="data" placeholder="Data">

      <select id="tipo">
        <option>Casamento</option>
        <option>Aniversário</option>
        <option>Ensaio</option>
        <option>Formatura</option>
      </select>

      <input
        type="text"
        id="cliente"
        placeholder="Cliente"
      >

      <input
        type="text"
        id="telefone"
        placeholder="Telefone"
      >

      <input
        type="number"
        id="valor"
        placeholder="Valor"
        oninput="calcularRestante()"
      >

      <input
        type="number"
        id="sinal"
        placeholder="Sinal"
        oninput="calcularRestante()"
      >

      <input
        type="number"
        id="restante"
        placeholder="Restante"
        readonly
      >

      <input
        type="text"
        id="local"
        placeholder="Local do evento"
      >

      <input
        type="time"
        id="horario"
        placeholder="Horário"
      >

      <textarea
        id="observacoes"
        placeholder="Observações"
      ></textarea>

      <select id="status">

        <option value="Pendente">
          Pendente
        </option>

        <option value="Pago">
          Pago
        </option>

        <option value="Cancelado">
          Cancelado
        </option>

      </select>

      <button onclick="abrirWhatsapp()">
        WhatsApp
      </button>

      <button onclick="salvarEvento()">
        Salvar
      </button>

      <button
        id="btnExcluir"
        onclick="excluirEventoAtual()"
      >
        Excluir Evento
      </button>

      <button onclick="fecharModal()">
        Cancelar
      </button>

    </div>

  </div>

  <!-- =========================================
                  SCRIPTS
  ========================================== -->

  <script src="js/api/api.js"></script>

  <script src="js/components/modal.js?v=2"></script>

  <script src="js/components/calendar.js?v=2"></script>

  <script src="js/components/cards.js?v=2"></script>

  <script src="js/modules/eventos.js?v=2"></script>

  <script src="js/modules/dashboard.js?v=2"></script>

  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js'></script>

  <script>

    carregarDashboard();

    if('serviceWorker' in navigator){

      navigator.serviceWorker
        .register('./sw.js')

        .then(() => {

          console.log('PWA ativo');

        });

    }

  </script>

</body>
</html>
