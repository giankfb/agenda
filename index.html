<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- ======================================
     META
  ======================================= -->
  <meta charset="UTF-8">

  <!-- CONFIG -->
  <script src="config/config.js?v=1.1.1"></script>

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#000000"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <title>
    Agenda Fotografia
  </title>


  <!-- ======================================
     CSS
  ======================================= -->

  <link
    id="style-css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
  >

  <link
    id="manifest-link"
    rel="manifest"
  >

</head>

<body>

  <!-- ======================================
     TOPO
  ======================================= -->
  <header class="topbar">

    <div>

      <h1>
        Agenda
      </h1>

      <p>
        Controle de eventos
      </p>

    </div>

    <button
      id="btnNovoEvento"
      onclick="abrirModal()"
    >
      +
    </button>

  </header>


  <!-- ======================================
     FILTROS
  ======================================= -->
  <section class="filtros">

    <input
      type="text"
      id="busca"
      placeholder="Buscar cliente..."
      autocomplete="off"
    >

    <select id="filtroStatus">

      <option value="Todos">
        Todos
      </option>

      <option value="Pendente">
        Pendentes
      </option>

      <option value="Pago">
        Pagos
      </option>

      <option value="Cancelado">
        Cancelados
      </option>

    </select>

  </section>


  <!-- ======================================
     MAIN
  ======================================= -->
  <main>

    <div id="dashboard-cards"></div>

    <div id="listaEventos"></div>

    <div class="acoes-topo">

      <button id="toggleCalendario">
        Ver Calendário
      </button>

    </div>

    <div
      id="calendarContainer"
      class="hidden"
    >

      <div id="calendar"></div>

    </div>

  </main>


  <!-- ======================================
     MODAL EVENTO
  ======================================= -->
  <div
    id="modalEvento"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>
        Novo Evento
      </h2>

      <input
        type="date"
        id="data"
      >

      <select id="tipo"></select>

      <!-- CLIENTE -->
      <div class="campo-com-acao">

        <input
          type="text"
          id="cliente"
          placeholder="Cliente"
          list="listaClientes"
          onchange="preencherTelefoneCliente()"
        >

        <button
          type="button"
          class="btn-add-inline"
          onclick="abrirNovoClienteRapido()"
        >
          +
        </button>

      </div>

      <datalist id="listaClientes"></datalist>

      <input
        type="tel"
        id="telefone"
        placeholder="Telefone"
        oninput="mascaraTelefone(this)"
      >

      <input
        type="text"
        id="valor"
        placeholder="0,00"
        oninput="
          mascaraMoeda(this);
          calcularRestante();
        "
      >

      <input
        type="text"
        id="sinal"
        placeholder="Sinal R$ 0,00"
        oninput="
          mascaraMoeda(this);
          calcularRestante();
        "
      >

      <input
        type="text"
        id="restante"
        placeholder="R$0,00"        
        readonly
      >

      <input
        type="text"
        id="local"
        placeholder="Local do evento"
      >

      <input
        type="text"
        id="horario"
        placeholder="00:00"
        maxlength="5"
        oninput="mascaraHorario(this)"
      >

      <textarea
        id="observacoes"
        placeholder="Observações"
      ></textarea>

      <select id="status">

        <option value="Pendente">
          Pendente
        </option>

        <option value="Pago">
          Pago
        </option>

        <option value="Cancelado">
          Cancelado
        </option>

      </select>

      <button onclick="abrirWhatsapp()">
        WhatsApp
      </button>

      <button onclick="salvarEvento()">
        Salvar
      </button>

      <button
        id="btnExcluir"
        onclick="excluirEventoAtual()"
      >
        Excluir Evento
      </button>

      <button onclick="fecharModal()">
        Cancelar
      </button>

    </div>

  </div>

  <!-- ======================================
       FINANCEIRO
  ====================================== -->
  <section class="financeiro-box">

    <div class="clientes-topo">

      <div>
        <h2>
          Financeiro
        </h2>

        <p>
          Controle de entradas e saídas
        </p>
      </div>

      <button onclick="abrirModalFinanceiro()">
        +
      </button>

    </div>

    <div id="dashboardFinanceiro">

    </div>

    <div id="listaFinanceiro">

    </div>

  </section>

  <!-- ======================================
       MODAL FINANCEIRO
  ====================================== -->
  <div
    id="modalFinanceiro"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>
        Lançamento Financeiro
      </h2>

      <input
        type="date"
        id="finData"
      >

      <select id="finTipo">

        <option value="Entrada">
          Entrada
        </option>

        <option value="Saida">
          Saída
        </option>

      </select>

      <input
        type="text"
        id="finCategoria"
        placeholder="Categoria"
      >

      <input
        type="text"
        id="finDescricao"
        placeholder="Descrição"
      >

      <div class="campo-com-acao">

      <input
        list="clientesFinanceiroLista"
        type="text"
        id="finCliente"
        placeholder="Cliente"
        onchange="preencherTelefoneFinanceiro()"
      >

      <button
        class="btn-add-inline"
        onclick="abrirModalClienteFinanceiro()"
      >
        +
      </button>

    </div>

    <datalist id="clientesFinanceiroLista"></datalist>

      <input
        type="text"
        id="finTelefone"
        placeholder="Telefone"
        oninput="mascaraTelefone(this)"
      >

      <input
        type="text"
        id="finValor"
        placeholder="Valor"
        oninput="mascaraMoeda(this)"
      >

      <select id="finStatus">

        <option value="Pendente">
          Pendente
        </option>

        <option value="Pago">
          Pago
        </option>

      </select>

      <textarea
        id="finObservacoes"
        placeholder="Observações"
      ></textarea>

      <button onclick="salvarFinanceiro()">
        Salvar
      </button>

      <button
        id="btnExcluirFinanceiro"
        onclick="excluirFinanceiroAtual()"
      >
        Excluir
      </button>

      <button onclick="fecharModalFinanceiro()">
        Fechar
      </button>

    </div>

  </div>

  <!-- ======================================
     MODAL CLIENTE
  ======================================= -->
  <div
    id="modalCliente"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>
        Cliente
      </h2>

      <input
        type="text"
        id="clienteNome"
        placeholder="Nome"
      >

      <input
        type="text"
        id="clienteTelefone"
        placeholder="Telefone"
        oninput="mascaraTelefone(this)"
      >

      <div class="card-acoes">

        <button onclick="salvarCliente()">
          Salvar
        </button>

        <button
          id="btnExcluirCliente"
          onclick="excluirClienteAtual()"
        >
          Excluir
        </button>

        <button onclick="fecharModalCliente()">
          Cancelar
        </button>

      </div>

    </div>

  </div>


  <!-- ======================================
     TOAST
  ======================================= -->
  <div id="toastContainer"></div>


  <!-- ======================================
     CSS DINÂMICO
  ======================================= -->
  <script>

    document
      .getElementById('style-css')
      .href =
        `css/style.css?v=${APP_VERSION}`;

    document
      .getElementById('manifest-link')
      .href =
        `manifest.json?v=${APP_VERSION}`;

  </script>


  <!-- ======================================
     FULLCALENDAR
  ======================================= -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>


  <!-- ======================================
               SCRIPTS
  ====================================== -->  

  <!-- CONFIG -->
  <script src="js/config/config.js?v=1.1.1"></script>


  <!-- API -->
  <script src="js/api/api.js?v=1.1.1"></script>


  <!-- UTILS -->
  <script src="js/utils/helpers.js?v=1.1.1"></script>
  <script src="js/utils/format.js?v=1.1.1"></script>
  <script src="js/utils/validators.js?v=1.1.1"></script>
  <script src="js/utils/masks.js?v=1.1.1"></script>


  <!-- COMPONENTS -->
  <script src="js/components/toast.js?v=1.1.1"></script>
  <script src="js/components/modal.js?v=1.1.1"></script>
  <script src="js/components/cards.js?v=1.1.1"></script>
  <script src="js/components/calendar.js?v=1.1.1"></script>


  <!-- MODULES -->
  <script src="js/modules/clientes.js?v=1.1.1"></script>
  <script src="js/modules/eventos.js?v=1.1.1"></script>
  <script src="js/modules/dashboard.js?v=1.1.1"></script>
  <script src="js/modules/financeiro.js?v=1.1.1"></script>

  <!-- SERVICES -->
  <script src="js/services/eventos.service.js?v=1.1.1"></script>
  

  <!-- APP -->
  <script src="js/app.js?v=1.1.1"></script>

  
</body>
</html>
