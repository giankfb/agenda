<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- ======================================
     META
  ======================================= -->
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <meta
    name="theme-color"
    content="#000000"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <title>
    Agenda Fotografia
  </title>


  <!-- ======================================
     CSS
  ======================================= -->

  <link
    id="style-css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css"
  >

  <link
    id="manifest-link"
    rel="manifest"
  >

</head>

<body>

  <!-- ======================================
     TOPO
  ======================================= -->
  <header class="topbar">

    <div>

      <h1>
        Agenda
      </h1>

      <p>
        Controle de eventos
      </p>

    </div>

    <button
      id="btnNovoEvento"
      onclick="abrirModal()"
    >
      +
    </button>

  </header>


  <!-- ======================================
     FILTROS
  ======================================= -->
  <section class="filtros">

    <input
      type="text"
      id="busca"
      placeholder="Buscar cliente..."
      autocomplete="off"
    >

    <select id="filtroStatus">

      <option value="Todos">
        Todos
      </option>

      <option value="Pendente">
        Pendentes
      </option>

      <option value="Pago">
        Pagos
      </option>

      <option value="Cancelado">
        Cancelados
      </option>

    </select>

  </section>


  <!-- ======================================
     MAIN
  ======================================= -->
  <main>

    <div id="dashboard-cards"></div>

    <div id="listaEventos"></div>

    <div class="acoes-topo">

      <button id="toggleCalendario">
        Ver Calendário
      </button>

    </div>

    <div
      id="calendarContainer"
      class="hidden"
    >

      <div id="calendar"></div>

    </div>

  </main>


  <!-- ======================================
     MODAL EVENTO
  ======================================= -->
  <div
    id="modalEvento"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>
        Novo Evento
      </h2>

      <input
        type="date"
        id="data"
      >

      <select id="tipo"></select>

      <!-- CLIENTE -->
      <div class="campo-com-acao">

        <input
          type="text"
          id="cliente"
          placeholder="Cliente"
          list="listaClientes"
        >

        <button
          type="button"
          class="btn-add-inline"
          onclick="abrirNovoClienteRapido()"
        >
          +
        </button>

      </div>

      <datalist id="listaClientes"></datalist>

      <input
        type="tel"
        id="telefone"
        placeholder="Telefone"
      >

      <input
        type="number"
        id="valor"
        placeholder="Valor"
        oninput="calcularRestante()"
      >

      <input
        type="number"
        id="sinal"
        placeholder="Sinal"
        oninput="calcularRestante()"
      >

      <input
        type="number"
        id="restante"
        placeholder="Restante"
        readonly
      >

      <input
        type="text"
        id="local"
        placeholder="Local do evento"
      >

      <input
        type="time"
        id="horario"
      >

      <textarea
        id="observacoes"
        placeholder="Observações"
      ></textarea>

      <select id="status">

        <option value="Pendente">
          Pendente
        </option>

        <option value="Pago">
          Pago
        </option>

        <option value="Cancelado">
          Cancelado
        </option>

      </select>

      <button onclick="abrirWhatsapp()">
        WhatsApp
      </button>

      <button onclick="salvarEvento()">
        Salvar
      </button>

      <button
        id="btnExcluir"
        onclick="excluirEventoAtual()"
      >
        Excluir Evento
      </button>

      <button onclick="fecharModal()">
        Cancelar
      </button>

    </div>

  </div>


  <!-- ======================================
     MODAL CLIENTE
  ======================================= -->
  <div
    id="modalCliente"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>
        Cliente
      </h2>

      <input
        type="text"
        id="clienteNome"
        placeholder="Nome"
      >

      <input
        type="text"
        id="clienteTelefone"
        placeholder="Telefone"
      >

      <div class="card-acoes">

        <button onclick="salvarCliente()">
          Salvar
        </button>

        <button
          id="btnExcluirCliente"
          onclick="excluirClienteAtual()"
        >
          Excluir
        </button>

        <button onclick="fecharModalCliente()">
          Cancelar
        </button>

      </div>

    </div>

  </div>


  <!-- ======================================
     TOAST
  ======================================= -->
  <div id="toastContainer"></div>


  <!-- ======================================
     CSS DINÂMICO
  ======================================= -->
  <script>

    document
      .getElementById('style-css')
      .href =
        `css/style.css?v=${APP_VERSION}`;

    document
      .getElementById('manifest-link')
      .href =
        `manifest.json?v=${APP_VERSION}`;

  </script>


  <!-- ======================================
     FULLCALENDAR
  ======================================= -->
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js"></script>


  <!-- ======================================
               SCRIPTS
  ====================================== -->

  <!-- API -->
  <script src="js/api/api.js?v=1.1.1"></script>

  <!-- CONFIG -->
  <script src="config/config.js?v=1.1.1"></script>

  <!-- UTILS -->
  <script src="js/utils/helpers.js?v=1.1.1"></script>

  <script src="js/utils/format.js?v=1.1.1"></script>

  <script src="js/utils/validators.js?v=1.1.1"></script>

  <!-- COMPONENTS -->
  <script src="js/components/toast.js?v=1.1.1"></script>

  <script src="js/components/modal.js?v=1.1.1"></script>

  <script src="js/components/cards.js?v=1.1.1"></script>

  <script src="js/components/calendar.js?v=1.1.1"></script>

  <!-- MODULES -->
  <script src="js/modules/clientes.js?v=1.1.1"></script>

  <script src="js/modules/eventos.js?v=1.1.1"></script>

  <script src="js/modules/dashboard.js?v=1.1.1"></script>


  <!-- ======================================
                INIT
  ====================================== -->
  <script>

    window.addEventListener(
      'load',
      async () => {

        try{

          await carregarDashboard();

          if(
            'serviceWorker'
            in navigator
          ){

            const registro =
              await navigator
                .serviceWorker
                .register(
                  `./sw.js?v=${APP_VERSION}`
                );

            console.log(
              'PWA ativo'
            );

            if(registro.waiting){

              registro.waiting.postMessage({

                action:'skipWaiting'

              });

            }

          }

        }catch(error){

          console.error(error);

        }

      }
    );

  </script>  

</body>
</html>
