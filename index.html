<!DOCTYPE html>
<html lang="pt-BR">

<head>

  <!-- ======================================
     META
  ======================================= -->
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="
      width=device-width,
      initial-scale=1.0,
      maximum-scale=1.0,
      user-scalable=no
    "
  >

  <meta
    name="theme-color"
    content="#000000"
  >

  <meta
    name="apple-mobile-web-app-capable"
    content="yes"
  >

  <meta
    name="mobile-web-app-capable"
    content="yes"
  >

  <title>
    Agenda Fotografia
  </title>


  <!-- ======================================
     VERSIONAMENTO
  ======================================= -->
  <script>

    const APP_VERSION =
      '1.1.0';

  </script>


  <!-- ======================================
     CSS
  ======================================= -->
  <link
    id="style-css"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="
      https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css
    "
  >

  <link
    id="manifest-link"
    rel="manifest"
  >

</head>

<body>

  <!-- ======================================
     TOPO
  ======================================= -->
  <header class="topbar">

    <div>

      <h1>
        Agenda
      </h1>

      <p>
        Controle de eventos
      </p>

    </div>

    <button
      id="btnNovoEvento"
      onclick="abrirModal()"
    >
      +
    </button>

  </header>


  <!-- ======================================
     FILTROS
  ======================================= -->
  <section class="filtros">

    <input
      type="text"
      id="busca"
      placeholder="Buscar cliente..."
      autocomplete="off"
    >

    <select id="filtroStatus">

      <option value="Todos">
        Todos
      </option>

      <option value="Pendente">
        Pendentes
      </option>

      <option value="Pago">
        Pagos
      </option>

      <option value="Cancelado">
        Cancelados
      </option>

    </select>

  </section>


  <!-- ======================================
     MAIN
  ======================================= -->
  <main>

    <!-- DASHBOARD -->
    <div id="dashboard-cards"></div>

    <!-- EVENTOS -->
    <div id="listaEventos"></div>

    <!-- CLIENTES -->
    <section class="clientes-box">

      <div class="clientes-topo">

        <h2>Clientes</h2>

        <button onclick="abrirModalCliente()">
          Novo Cliente
        </button>

      </div>

      <div id="listaClientesCards"></div>

    </section>

    <!-- AÇÕES -->
    <div class="acoes-topo">

      <button id="toggleCalendario">

        Ver Calendário

      </button>

    </div>

    <!-- CALENDÁRIO -->
    <div
      id="calendarContainer"
      class="hidden"
    >

      <div id="calendar"></div>

    </div>

  </main>


  <!-- ======================================
     MODAL
  ======================================= -->
  <div
    id="modalEvento"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>
        Novo Evento
      </h2>

      <!-- DATA -->
      <input
        type="date"
        id="data"
      >

      <!-- TIPO -->
      <select id="tipo">

        <option>
          Casamento
        </option>

        <option>
          Aniversário
        </option>

        <option>
          Ensaio
        </option>

        <option>
          Formatura
        </option>

      </select>

      <!-- CLIENTE -->
      <input
        type="text"
        id="cliente"
        placeholder="Cliente"
        list="listaClientes"
        autocomplete="off"
      >

      <datalist id="listaClientes"></datalist>

      <!-- TELEFONE -->
      <input
        type="tel"
        id="telefone"
        placeholder="Telefone"
      >

      <!-- VALOR -->
      <input
        type="number"
        id="valor"
        placeholder="Valor"
        oninput="calcularRestante()"
      >

      <!-- SINAL -->
      <input
        type="number"
        id="sinal"
        placeholder="Sinal"
        oninput="calcularRestante()"
      >

      <!-- RESTANTE -->
      <input
        type="number"
        id="restante"
        placeholder="Restante"
        readonly
      >

      <!-- LOCAL -->
      <input
        type="text"
        id="local"
        placeholder="Local do evento"
      >

      <!-- HORÁRIO -->
      <input
        type="time"
        id="horario"
      >

      <!-- OBS -->
      <textarea
        id="observacoes"
        placeholder="Observações"
      ></textarea>

      <!-- STATUS -->
      <select id="status">

        <option value="Pendente">
          Pendente
        </option>

        <option value="Pago">
          Pago
        </option>

        <option value="Cancelado">
          Cancelado
        </option>

      </select>


      <!-- BOTÕES -->
      <button onclick="abrirWhatsapp()">

        WhatsApp

      </button>

      <button onclick="salvarEvento()">

        Salvar

      </button>

      <button
        id="btnExcluir"
        onclick="excluirEventoAtual()"
      >

        Excluir Evento

      </button>

      <button onclick="fecharModal()">

        Cancelar

      </button>

    </div>

  </div>

  <!-- =========================================
              MODAL CLIENTE
  ========================================== -->

  <div
    id="modalCliente"
    class="modal hidden"
  >

    <div class="modal-content">

      <h2>Cliente</h2>

      <input
        type="text"
        id="clienteNome"
        placeholder="Nome"
      >

      <input
        type="text"
        id="clienteTelefone"
        placeholder="Telefone"
      >

      <div class="card-acoes">

        <button onclick="salvarCliente()">
          Salvar
        </button>

        <button
          id="btnExcluirCliente"
          onclick="excluirClienteAtual()"
        >
          Excluir
        </button>

        <button onclick="fecharModalCliente()">
          Cancelar
        </button>

      </div>

    </div>

  </div>

  <!-- ======================================
     TOAST
  ======================================= -->
  <div id="toastContainer"></div>


  <!-- ======================================
     FULLCALENDAR
  ======================================= -->
  <script
    src="
      https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js
    "
  ></script>


  <!-- ======================================
     VERSIONAMENTO DINÂMICO
  ======================================= -->
  <script>

    /* ====================================
       CSS
    ==================================== */
    document
      .getElementById('style-css')
      .href =
        `css/style.css?v=${APP_VERSION}`;

    /* ====================================
       MANIFEST
    ==================================== */
    document
      .getElementById('manifest-link')
      .href =
        `manifest.json?v=${APP_VERSION}`;

    /* ====================================
       SCRIPTS
    ==================================== */
    const scripts = [

      'js/api/api.js',

      'js/components/modal.js',

      'js/components/calendar.js',

      'js/components/cards.js',

      'js/components/toast.js',

      'js/modules/clientes.js',

      'js/modules/eventos.js',

      'js/modules/dashboard.js'

    ];

    scripts.forEach(src => {

      const script =
        document.createElement('script');

      script.src =
        `${src}?v=${APP_VERSION}`;

      document.body.appendChild(
        script
      );

    });

  </script>


  <!-- ======================================
     INIT
  ======================================= -->
  <script>

    window.addEventListener(
      'load',
      async () => {

        await carregarDashboard();

      }
    );

  </script>


  <!-- ======================================
     PWA
  ======================================= -->
  <script>

    if(
      'serviceWorker'
      in navigator
    ){

      navigator.serviceWorker
        .register(
          `./sw.js?v=${APP_VERSION}`
        )

        .then(() => {

          console.log(
            'PWA ativo'
          );

        })

        .catch(error => {

          console.error(
            'Erro SW',
            error
          );

        });

    }

  </script>

</body>
</html>
